<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlobalIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #ffffff; }
    #root { min-height: 100vh; }
    .press { position: relative; width: 100%; overflow: hidden; }
    .press::before, .press::after { display: none; }
    .press-track { display: flex; align-items: center; width: max-content; animation: press-scroll 18s linear infinite; }
    @keyframes press-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .press-logo { display: flex; align-items: center; gap: 6px; white-space: nowrap; flex-shrink: 0; justify-content: center; min-width: 120px; margin-right: 130px; }
    @media (prefers-reduced-motion: reduce) { .press-track { animation: none; } }
  
    /* ===== merged footer styles (from Trust page) ===== */
    :root{ --blue:#1a3cff; --muted:#707b8a; --text:#16263b; --navy:#0a1560; --light-blue:#dce8f8; }
    footer{position:relative;clear:both;z-index:0;border-top:1px solid #e2e8f0;background:#f7f9ff;color:var(--text);padding:40px 24px 24px;font-family:'Inter',system-ui,-apple-system,sans-serif;}
    .logo-footer{margin-left:-18px;} .logo-footer img{height:65px;width:auto;display:block;}
    .footer-social{display:flex;gap:16px;margin-top:20px;margin-bottom:28px;}
    .footer-social a{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:#e2e8f0;color:var(--navy);text-decoration:none;}
    .footer-social a:hover{background:var(--light-blue);}
    .footer-section{margin-bottom:28px;}
    .footer-section h4{color:var(--navy);font-size:0.95rem;font-weight:700;margin-bottom:12px;}
    .footer-section a{display:block;width:fit-content;color:var(--muted);text-decoration:none;font-size:0.9rem;margin-bottom:10px;}
    .footer-section a:hover{color:var(--blue);}
    .footer-support-btn{display:flex;align-items:center;gap:10px;border:1.5px solid #cbd5e1;border-radius:12px;padding:12px 16px;width:fit-content;color:var(--muted);font-size:0.88rem;text-decoration:none;margin-top:4px;}
    .footer-support-btn:hover{border-color:var(--blue);color:var(--blue);}
    .footer-lang-wrap{margin:20px 0 16px;}
    .lang-btn{display:flex;align-items:center;gap:8px;border:1.5px solid #cbd5e1;border-radius:12px;padding:10px 16px;background:white;font-size:0.9rem;color:var(--text);cursor:pointer;width:fit-content;}
